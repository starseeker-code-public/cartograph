services:
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    image: cartograph-postgres:16-3.4-3.6
    environment:
      POSTGRES_USER: cartograph
      POSTGRES_PASSWORD: cartograph
      POSTGRES_DB: cartograph
    ports:
      - "5432:5432"
    volumes:
      - cartograph_pg:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cartograph -d cartograph"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  cartograph_pg: {}
