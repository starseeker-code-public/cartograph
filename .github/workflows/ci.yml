name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — lint + typecheck + test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      # postgis/postgis lacks pgrouting, so build the project's own postgres
      # image (postgis + pgrouting + pg_partman) and run it as a container.
      - name: Build + start PostGIS/pgrouting
        working-directory: ${{ github.workspace }}
        run: |
          docker build -t cartograph-postgres:ci \
            -f infra/compose/postgres.Dockerfile infra/compose
          docker run -d --name postgres \
            -e POSTGRES_USER=cartograph \
            -e POSTGRES_PASSWORD=cartograph \
            -e POSTGRES_DB=cartograph \
            -p 5432:5432 \
            -v ${{ github.workspace }}/infra/compose/init.sql:/docker-entrypoint-initdb.d/zz-init.sql:ro \
            cartograph-postgres:ci
          for i in $(seq 1 30); do
            docker exec postgres pg_isready -U cartograph -d cartograph && break
            sleep 2
          done

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check cartograph

      - name: Format check (black)
        run: uv run black --check cartograph

      - name: Type check (mypy)
        run: uv run mypy cartograph

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://cartograph:cartograph@localhost:5432/cartograph
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-secret-key
        run: uv run pytest -v --tb=short

  web:
    name: Web — typecheck + test + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test

      - name: Typecheck + build
        run: npm run build
