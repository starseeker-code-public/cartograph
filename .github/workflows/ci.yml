name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — lint + typecheck + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: cartograph
          POSTGRES_PASSWORD: cartograph
          POSTGRES_DB: cartograph
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check cartograph

      - name: Format check (black)
        run: uv run black --check cartograph

      - name: Type check (mypy)
        run: uv run mypy cartograph

      - name: Load PostGIS extensions
        run: |
          PGPASSWORD=cartograph psql -h localhost -U cartograph -d cartograph \
            -c "CREATE EXTENSION IF NOT EXISTS postgis; \
                CREATE EXTENSION IF NOT EXISTS pgrouting; \
                CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://cartograph:cartograph@localhost:5432/cartograph
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-secret-key
        run: uv run pytest -v --tb=short
